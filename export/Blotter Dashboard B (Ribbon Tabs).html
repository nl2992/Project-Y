<script>
/* ================================================================================
   WSG Blotter shared engine.
   Exercise logic ported from wsg_blotter_desk_dashboard.html (the stitched
   reconstruction). Enterprise connections are retained on purpose even though
   they do not resolve on a developer machine:
     - Live USDHKD feed: /studio/api/fx_spot_time_series (Bloomberg-backed)
     - HSBC icon asset:  /studio/static/ui/hsbc_icon.ico
     - XLSX + Highcharts CDNs
   ================================================================================ */

const FX_PAIR = "USDHKD";
const FX_LOOKBACK_DAYS = 35;
const LIVE_FX_FALLBACK = 7.8430;

/* ---------- generic utilities (verbatim from the stitched dashboard) ---------- */
function escapeHtml(v) {
  return String(v ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
  }[ch]));
}
function cleanText(v) {
  if (v == null) return "";
  return String(v).replace(/\s+/g, " ").trim();
}
function parseNumber(v) {
  if (v == null || v === "") return null;
  if (typeof v === "number" && Number.isFinite(v)) return v;
  let s = String(v).trim();
  if (!s) return null;
  let neg = false;
  if (/^\(.*\)$/.test(s)) { neg = true; s = s.slice(1, -1); }
  s = s.replace(/[%,$\s]/g, "").replace(/−/g, "-");
  if (!s || s === "-" || s === ".") return null;
  const n = Number(s);
  if (!Number.isFinite(n)) return null;
  return neg ? -n : n;
}
function isoDate(v) {
  if (v == null || v === "") return null;
  if (v instanceof Date && !Number.isNaN(v.getTime())) return v.toISOString().slice(0, 10);
  if (typeof v === "number") {
    const epoch = Date.UTC(1899, 11, 30);
    const d = new Date(epoch + v * 86400000);
    return d.toISOString().slice(0, 10);
  }
  const s = cleanText(v);
  if (!s) return null;
  const direct = new Date(s);
  if (!Number.isNaN(direct.getTime())) return direct.toISOString().slice(0, 10);
  const m = s.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})$/);
  if (m) {
    const year = Number(m[3].length === 2 ? `20${m[3]}` : m[3]);
    const month = Number(m[2]) - 1;
    const day = Number(m[1]);
    const d = new Date(Date.UTC(year, month, day));
    if (!Number.isNaN(d.getTime())) return d.toISOString().slice(0, 10);
  }
  return null;
}
function parseDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(`${dateStr}T00:00:00Z`);
  return Number.isNaN(d.getTime()) ? null : d;
}
function addYears(dateStr, deltaYears) {
  const d = parseDate(dateStr);
  if (!d) return null;
  d.setUTCFullYear(d.getUTCFullYear() + deltaYears);
  return d.toISOString().slice(0, 10);
}
function withinPeriod(dateStr, startStr, endStr) {
  const d = parseDate(dateStr), s = parseDate(startStr), e = parseDate(endStr);
  return !!(d && s && e && d >= s && d <= e);
}
function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}
function sortBy(arr, fn, desc = false) {
  return [...arr].sort((a, b) => {
    const av = fn(a), bv = fn(b);
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (av < bv) return desc ? 1 : -1;
    if (av > bv) return desc ? -1 : 1;
    return 0;
  });
}
function groupBy(arr, fn) {
  const m = new Map();
  for (const item of arr) {
    const k = fn(item);
    if (!m.has(k)) m.set(k, []);
    m.get(k).push(item);
  }
  return m;
}
function canonKey(k) {
  return cleanText(k).toLowerCase().replace(/[^a-z0-9]+/g, "");
}
function pick(obj, keys) {
  if (!obj) return null;
  const byCanon = new Map(Object.keys(obj).map(k => [canonKey(k), obj[k]]));
  for (const k of keys) {
    if (Object.prototype.hasOwnProperty.call(obj, k)) return obj[k];
    const hit = byCanon.get(canonKey(k));
    if (hit != null && hit !== "") return hit;
  }
  return null;
}
function downloadTextFile(filename, text) {
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

/* ---------- fact-row model (verbatim) ---------- */
function mainSummaryBucket(assetClass) {
  if (assetClass === "Structured Rate") return "Structured Rate";
  if (assetClass === "Structured Credit (Flow)") return "Structured Credit (Flow)";
  if (assetClass === "Illiquid Credit" || assetClass === "Repack") return "Illiquid Credit + Repack";
  if (assetClass === "Collar") return "Collar";
  if (assetClass === "Equity TRS") return "Equity TRS";
  if (assetClass === "FX") return "FX";
  return "Other";
}
function flagsFor(assetClass) {
  return {
    flag_structured_rate: assetClass === "Structured Rate",
    flag_structured_credit: assetClass === "Structured Credit (Flow)",
    flag_illiquid_repack: assetClass === "Illiquid Credit" || assetClass === "Repack",
    flag_collar: assetClass === "Collar",
    flag_equity_trs: assetClass === "Equity TRS",
    flag_fx: assetClass === "FX"
  };
}
function normalizeAction(raw) {
  const s = cleanText(raw).toLowerCase();
  if (!s) return "New";
  if (/unwind|close|terminate|cancel|matur/.test(s)) return "Unwind";
  if (/roll|amend|modify/.test(s)) return "Roll";
  if (/new|increase|open|add|buy|sell/.test(s)) return "New";
  return cleanText(raw);
}
function signFromAction(action) {
  if (/unwind|close|terminate|cancel|matur/i.test(action || "")) return -1;
  if (/roll/i.test(action || "")) return 0;
  return 1;
}
function makeFactRow(base) {
  const assetClass = base.assetClass || "Other";
  const sign = base.signMultiplier ?? signFromAction(base.actionType);
  const notionalUsd = base.notionalUsd ?? null;
  return {
    id: uid(),
    sourceKind: base.sourceKind || "unknown",
    sourceSheet: base.sourceSheet || "",
    sourceRecordId: base.sourceRecordId || "",
    assetClass,
    mainSummaryBucket: base.mainSummaryBucket || mainSummaryBucket(assetClass),
    includeInSummary: base.includeInSummary !== false,
    includeInTotalExFx: base.includeInTotalExFx !== false && assetClass !== "FX",
    tradeDate: base.tradeDate || null,
    yearInt: base.yearInt ?? (base.tradeDate ? parseDate(base.tradeDate)?.getUTCFullYear() : null),
    actionType: base.actionType || "New",
    signMultiplier: sign,
    book: cleanText(base.book) || "Unassigned",
    trader: cleanText(base.trader),
    salesTeam: cleanText(base.salesTeam),
    finalCustomer: cleanText(base.finalCustomer),
    issuer: cleanText(base.issuer),
    underlying: cleanText(base.underlying) || "Unknown",
    isin: cleanText(base.isin),
    currency: cleanText(base.currency) || "USD",
    notionalLocal: base.notionalLocal ?? null,
    notionalUsd,
    signedNotionalUsd: base.signedNotionalUsd ?? (notionalUsd == null ? null : sign * notionalUsd),
    mssRevenueUsd: base.mssRevenueUsd ?? base.gnbvUsd ?? 0,
    bankRevenueUsd: base.bankRevenueUsd ?? base.mssRevenueUsd ?? base.gnbvUsd ?? 0,
    gnbvUsd: base.gnbvUsd ?? base.mssRevenueUsd ?? 0,
    pbFeeUsd: base.pbFeeUsd ?? 0,
    headlineNotionalUsd: base.headlineNotionalUsd ?? notionalUsd ?? 0,
    headlineRevenueUsd: base.headlineRevenueUsd ?? base.mssRevenueUsd ?? base.gnbvUsd ?? 0,
    shareCount: base.shareCount ?? null,
    signedShareCount: base.signedShareCount ?? null,
    assetSpecificJson: base.assetSpecificJson || {},
    raw: base.raw || null,
    ...flagsFor(assetClass)
  };
}

/* ---------- workbook helpers (verbatim) ---------- */
function collectRawSheetPreview(workbook) {
  const out = {};
  workbook.SheetNames.forEach(sheetName => {
    const aoa = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1, defval: null, raw: true });
    const colCount = aoa.reduce((m, r) => Math.max(m, r.length), 0);
    out[sheetName] = {
      aoa,
      preview: aoa.slice(0, 60),
      rowCount: aoa.length,
      colCount
    };
  });
  return out;
}
function detectWorkbookType(workbook) {
  const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: null, raw: true });
  const headers = rows.length ? Object.keys(rows[0]) : [];
  const headerText = headers.map(canonKey).join("|");
  const hasFlat = ["tier1producttype", "tradedate", "volume"].every(h => headerText.includes(h)) &&
    (headerText.includes("pc") || headerText.includes("vagnbv") || headerText.includes("gnbv"));
  return hasFlat ? "cleaned_flat" : "legacy";
}
function parseCommentMeta(comment) {
  const meta = { raw: cleanText(comment), tokens: [] };
  if (!meta.raw) return meta;
  meta.tokens = meta.raw.split(/[|;\n]+/).map(x => cleanText(x)).filter(Boolean);
  meta.tokens.forEach(part => {
    const idx = part.search(/[:=]/);
    if (idx > 0) {
      const k = cleanText(part.slice(0, idx)).toLowerCase().replace(/[^a-z0-9]+/g, "_");
      meta[k] = cleanText(part.slice(idx + 1));
    }
  });
  return meta;
}
function classifyCleanedAsset(row, meta) {
  const t1 = cleanText(pick(row, ["Tier 1 Product Type"])).toLowerCase();
  const t2 = cleanText(pick(row, ["Tier 2 Product Type"])).toLowerCase();
  const t3 = cleanText(pick(row, ["Tier 3 Product Type"])).toLowerCase();
  const a = `${t1} ${t2} ${t3} ${meta.raw || ""}`.toLowerCase();
  if (a.includes("equity trs") || t2 === "trs" || a.includes("total return swap")) return "Equity TRS";
  if (a.includes("collar")) return "Collar";
  if (a.includes("repack")) return "Repack";
  if (a.includes("illiquid")) return "Illiquid Credit";
  if (a.includes("structured fi - fx") || t2 === "fx" || t3 === "fx") return "FX";
  if (a.includes("structured credit") || a.includes("credit")) return "Structured Credit (Flow)";
  if (a.includes("structured rate") || a.includes("rate")) return "Structured Rate";
  if (t1 === "structured fi" && t2 === "fx") return "FX";
  return "Other";
}
function buildPeriodsFromFactRows(factRows) {
  const dated = factRows.filter(r => r.tradeDate);
  if (!dated.length) {
    const today = new Date().toISOString().slice(0, 10);
    const y = Number(today.slice(0, 4));
    return [{
      key: `${y}-default`,
      label: `${y} YTD through ${today.slice(5)}`,
      year: y,
      periodStart: `${y}-01-01`,
      periodEnd: today,
      priorPeriodStart: `${y - 1}-01-01`,
      priorPeriodEnd: addYears(today, -1)
    }];
  }
  const years = [...new Set(dated.map(r => parseDate(r.tradeDate).getUTCFullYear()))].sort((a, b) => b - a);
  return years.map(y => {
    const yearRows = dated.filter(r => parseDate(r.tradeDate).getUTCFullYear() === y);
    const maxDate = sortBy(yearRows, r => r.tradeDate, true)[0]?.tradeDate || `${y}-12-31`;
    const mmdd = maxDate.slice(5);
    return {
      key: `${y}-${mmdd}`,
      label: `${y} YTD through ${mmdd}`,
      year: y,
      periodStart: `${y}-01-01`,
      periodEnd: maxDate,
      priorPeriodStart: `${y - 1}-01-01`,
      priorPeriodEnd: `${y - 1}-${mmdd}`
    };
  });
}

/* ---------- cleaned flat parser ----------
   The row-level core is split out of parseCleanedFlatWorkbook so the in-page
   sample dataset can be pushed through the exact same parsing rules. */
function parseCleanedFlatRows(rows, sheetName) {
  const qa = [];
  const factRows = [];
  rows.forEach((r, idx) => {
    const meta = parseCommentMeta(pick(r, ["Comment", "Comments", "Notes"]));
    const assetClass = classifyCleanedAsset(r, meta);
    const actionRaw = meta.source_action || meta.action || pick(r, ["Action", "New/Unwind"]) || meta.tokens[0] || "";
    const actionType = normalizeAction(actionRaw);
    const sign = signFromAction(actionType);
    const volume = parseNumber(pick(r, ["*$ Volume", "$ Volume", "$ TV", "Volume", "Notional USD", "Notional (USD)"])) || 0;
    const pc = parseNumber(pick(r, ["*$ PC", "$ PC", "PC"])) || 0;
    const va = parseNumber(pick(r, ["*$ VA/GNBV", "$ VA/GNBV", "VA/GNBV", "GNBV (USD)", "GNBV"])) || 0;
    const pcSource = cleanText(meta.pc_source).toUpperCase();
    let mssRevenue = va || pc || 0;
    let pbFee = 0;
    let bankRevenue = va || pc || 0;
    if (pcSource === "PB_FEE_USD") {
      pbFee = pc || 0;
      mssRevenue = va || 0;
      bankRevenue = mssRevenue + pbFee;
    }
    const tradeDate = isoDate(pick(r, ["*Trade Date", "Trade Date", "Date"]));
    const sourceRecordId = cleanText(pick(r, ["*Trade ID", "Trade ID", "ISIN Code", "Reference number"])) || `flat-${idx + 2}`;
    const strategyKey = assetClass === "Collar" ?
      cleanText(pick(r, ["Strategy", "Underlying", "ISIN Code", "Issuer"])) || sourceRecordId : "";
    if (!tradeDate) qa.push({
      severity: "warn",
      issueType: "missing_trade_date",
      sourceSheet: sheetName,
      sourceRecordId,
      message: "Cleaned flat row has no parseable trade date."
    });
    if (assetClass === "Other") qa.push({
      severity: "info",
      issueType: "unclassified_asset",
      sourceSheet: sheetName,
      sourceRecordId,
      message: "Cleaned flat row could not be mapped to a dashboard asset bucket."
    });
    factRows.push(makeFactRow({
      sourceKind: "cleaned_flat",
      sourceSheet: sheetName,
      sourceRecordId,
      assetClass,
      tradeDate,
      yearInt: tradeDate ? parseDate(tradeDate).getUTCFullYear() : null,
      actionType,
      signMultiplier: sign,
      book: pick(r, ["Book", "Site Code", "Booking"]),
      trader: pick(r, ["Trader"]),
      salesTeam: pick(r, ["Sales Team", "Sales"]),
      finalCustomer: pick(r, ["Final Customer", "*Legal Entity", "Legal Entity"]),
      issuer: pick(r, ["Issuer", "*Legal Entity", "Legal Entity"]),
      underlying: pick(r, ["Underlying", "Issuer", "ISIN Code"]) || strategyKey,
      isin: pick(r, ["ISIN Code", "ISIN"]),
      currency: pick(r, ["*Primary CCY", "Primary CCY", "Revenue CCY", "CCY"]) || "USD",
      notionalUsd: volume,
      signedNotionalUsd: sign * volume,
      mssRevenueUsd: mssRevenue,
      bankRevenueUsd: bankRevenue,
      gnbvUsd: va,
      pbFeeUsd: pbFee,
      headlineNotionalUsd: sign > 0 ? volume : 0,
      headlineRevenueUsd: mssRevenue,
      assetSpecificJson: { commentMeta: meta, strategyKey },
      raw: r
    }));
  });
  return { factRows, qa };
}
function parseCleanedFlatWorkbook(workbook, filename) {
  const sheetName = workbook.SheetNames[0];
  const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: null, raw: true });
  const { factRows, qa } = parseCleanedFlatRows(rows, sheetName);
  return {
    datasetId: uid(),
    sourceKind: "cleaned_flat",
    filename,
    loadedAt: new Date().toISOString(),
    sheetNames: workbook.SheetNames,
    rawSheets: collectRawSheetPreview(workbook),
    qaIssues: qa,
    factRows,
    periods: buildPeriodsFromFactRows(factRows),
    workbookHeadlines: {
      notes: [
        "Cleaned flat workbook detected.",
        "Headline mode is synthesised from the normalised flat input."
      ]
    },
    parserNotes: [
      "The cleaned flat file is classified primarily from tier columns and comment metadata.",
      "Where comment metadata indicates pc_source=PB_FEE_USD, bank revenue is treated as MSS revenue plus PB fee.",
      "Rows are normalised into the same fact model as the legacy workbook."
    ]
  };
}

/* ---------- legacy parser (verbatim) ---------- */
function extractLegacyWorkbookHeadlines(rawSheets) {
  const result = {
    trsFxOverride: 7.843,
    mainRows: [],
    notes: [],
    trsSummary: { notes: [] }
  };
  const con = rawSheets["Consolidate Sheet"]?.aoa || rawSheets["Consolidated Sheet"]?.aoa || [];
  result.trsFxOverride = parseNumber(con?.[7]?.[0]) || result.trsFxOverride;
  const bucketLabels = ["Structured Rate", "Structured Credit (Flow)", "Illiquid Credit + Repack", "Collar", "Equity TRS", "FX", "Total"];
  con.forEach(row => {
    const labelText = row.map(cleanText).join(" ");
    const label = bucketLabels.find(x => labelText.toLowerCase().includes(x.toLowerCase().replace(" (flow)", "")));
    const nums = row.map(parseNumber).filter(v => v != null);
    if (label && nums.length >= 2) {
      result.mainRows.push({
        rowLabel: label,
        currentNotionalUsd: nums[0] || 0,
        currentRevenueUsd: nums[1] || 0,
        priorNotionalUsd: nums[2] || 0,
        priorRevenueUsd: nums[3] || 0,
        notionalChangePct: nums[4] ?? null,
        revenueChangePct: nums[5] ?? null
      });
    }
  });
  const trs = rawSheets["Equity TRS Summary"]?.aoa || [];
  if (trs.length) {
    const suspiciousGnbv2024 = parseNumber(trs?.[9]?.[2]);
    const suspiciousBank2024 = parseNumber(trs?.[10]?.[2]);
    if (suspiciousGnbv2024 && suspiciousBank2024 && Math.abs(suspiciousBank2024) < Math.abs(suspiciousGnbv2024)) {
      result.trsSummary.notes.push("The legacy Equity TRS summary sheet appears to have bank revenue lower than MSS revenue; raw rebuild remains available for control.");
    }
  }
  if (!result.mainRows.length) result.notes.push("No curated Consolidate Sheet headline rows were detected; headline mode will fall back to raw rebuild where required.");
  return result;
}
function buildLegacyPeriods(rawSheets, factRows) {
  const periods = [];
  const con = rawSheets["Consolidate Sheet"]?.aoa || [];
  con.forEach(row => {
    const year = parseInt(row?.[9], 10);
    const start = isoDate(row?.[14]);
    const end = isoDate(row?.[15]);
    if (year && start && end) {
      periods.push({
        key: `${year}-${end.slice(5)}`,
        label: `${year} YTD through ${end.slice(5)}`,
        year,
        periodStart: start,
        periodEnd: end,
        priorPeriodStart: addYears(start, -1),
        priorPeriodEnd: addYears(end, -1)
      });

function normaliseFxApiRows(json) {

      const firstObj = Object.values(v).find(x => x && typeof x === "object") || null;
      const close = parseNumber(v.close ?? v.value ?? v.mid ?? v.last ?? firstObj?.close ?? firstObj?.value);
      const date = isoDate(v.date ?? v.time ?? v.timestamp ?? v.fxDate ?? firstObj?.date);
      if (close != null) rows.push({ date, close });
      Object.values(v).forEach(child => {

    const url = `/studio/api/fx_spot_time_series?ccyPair=${encodeURIComponent(FX_PAIR)}&startDate=${start.toISOString().slice(0, 10)}&endDate=${end.toISOString().slice(0, 10)}&frequency=1D00:00:00`;
    const res = await fetch(url, { credentials: "include" });
    if (!res.ok) throw new Error(`FX API returned ${res.status}`);
    const json = await res.json();
    const data = normaliseFxApiRows(json);

      ],

/* ---------- expandable Main Summary row models ---------- */
function buildSummaryRowModels(view, state, pal) {
  const srows = [];
  view.summary.bodyRows.forEach(r => {
    const open = !!state.expanded[r.rowLabel];
    srows.push({
      act: "bucket", arg: r.rowLabel,
      label: r.rowLabel, caret: open ? "▾" : "▸", indent: pal.ind1, w: 700, lc: pal.ink, bg: "#fff", mc: "#374151",
      g2: money(r.currentNotionalUsd), g3: money(r.currentRevenueUsd), g4: money(r.priorNotionalUsd), g5: money(r.priorRevenueUsd),
      g6: fmtPct(r.notionalChangePct), g7: fmtPct(r.revenueChangePct),
      c6: pctColor(r.notionalChangePct), c7: pctColor(r.revenueChangePct),
      g8: r.currentCount == null ? "" : String(r.currentCount)
    });
    if (open) {
      const books = (view.rebuild.bucketRows.find(b => b.rowLabel === r.rowLabel) || {}).books || [];
      books.forEach(b => {
        const bkey = r.rowLabel + "|" + b.book;
        const bopen = !!state.expandedBooks[bkey];
        srows.push({
          act: "book", arg: bkey,
          label: b.book, caret: bopen ? "▾" : "▸", indent: pal.ind2, w: 700, lc: "#4b5563", bg: pal.subBg, mc: "#9ca3af",
          g2: money(b.notionalUsd), g3: money(b.revenueUsd), g4: "—", g5: "—", g6: "", g7: "", c6: "#6b7280", c7: "#6b7280",
          g8: String(b.count)
        });
        if (bopen) b.trades.slice(0, 8).forEach(t => {
          srows.push({
            act: "trade", arg: t.sourceRecordId,
            label: t.sourceRecordId + "  ·  " + t.underlying, caret: "", indent: pal.ind3, w: 400, lc: "#6b7280", bg: pal.tradeBg, mc: "#9ca3af",
            g2: fmtM(t.notionalUsd), g3: fmtM(t.mssRevenueUsd), g4: t.actionType, g5: t.trader || t.finalCustomer || "—",
            g6: (t.tradeDate || "").slice(5), g7: t.currency, c6: "#6b7280", c7: "#6b7280", g8: ""
          });
        });
      });
    }
  });
  const t = view.summary.total;
  const tot = {
    label: t.rowLabel + (view.mode === "variance" ? " (raw − headline)" : ""),
    g2: money(t.currentNotionalUsd), g3: money(t.currentRevenueUsd), g4: money(t.priorNotionalUsd), g5: money(t.priorRevenueUsd),
    g6: fmtPct(t.notionalChangePct), g7: fmtPct(t.revenueChangePct),
    c6: pctColor(t.notionalChangePct), c7: pctColor(t.revenueChangePct),
    g8: String(view.curRows.length)
  };
  return { srows, tot };
}

        cellObj(money(v.notionalVariance), v.notionalVariance === 0 ? "#6b7280" : v.notionalVariance > 0 ? "#15803d" : "#b91c1c", 700),

function buildUnifiedModel(view, uniFilter) {

    rows: filtered.slice(0, 60).map(r => ({
      cells: [cellObj((r.tradeDate || "").slice(5)), cellObj(r.sourceRecordId, "#16181d", 700), cellObj(r.book), cellObj(r.assetClass),
        cellObj(r.underlying), cellObj(r.actionType, actionColor(r.actionType), 700),
        cellObj(r.finalCustomer || "—"), cellObj(fmtM(r.notionalUsd)), cellObj(fmtM(r.mssRevenueUsd)), cellObj(fmtM(r.bankRevenueUsd))]
    }))

}
function buildInputModel(ds, activeSheet) {
  const name = ds.sheetNames.includes(activeSheet) ? activeSheet : ds.sheetNames[0];
  const sheet = ds.rawSheets[name] || { preview: [], rowCount: 0, colCount: 0 };
  const colCount = Math.max(1, sheet.colCount || (sheet.preview[0] || []).length || 1);
  const fmtCell = v => v == null ? "" : (typeof v === "number" ? fmtFull(v) : String(v));
  return {
    sheetNames: ds.sheetNames,
    active: name,
    rowCount: sheet.rowCount || 0,
    colCount,
    grid: `repeat(${colCount}, minmax(96px, 1.2fr))`,
    minWidth: Math.max(900, colCount * 112),
    headerCells: (sheet.preview[0] || []).map(fmtCell),
    bodyRows: sheet.preview.slice(1, 26).map(row => {
      const cells = [];
      for (let i = 0; i < colCount; i++) cells.push(fmtCell(row[i]));
      return cells;
    })
  };
}
function buildQaModel(ds) {
  return {
    grid: "64px minmax(130px,1.1fr) minmax(90px,.8fr) minmax(130px,1fr) minmax(260px,2.4fr)",
    cols: ["Severity", "Type", "Sheet", "Record", "Message"],
    rows: ds.qaIssues.map(i => ({
      cells: [cellObj((i.severity || "info").toUpperCase(), i.severity === "warn" ? "#b45309" : i.severity === "bad" ? "#b91c1c" : "#1d4ed8", 700),
        cellObj(i.issueType), cellObj(i.sourceSheet), cellObj(i.sourceRecordId, "#16181d", 700), cellObj(i.message, "#4b5563")]
    }))
  };
}
function searchTrades(view, q) {
  const needle = q.trim().toLowerCase();
  if (needle.length < 2) return [];
  return view.curRows.filter(r =>
    (r.sourceRecordId + " " + r.underlying + " " + r.finalCustomer + " " + r.book).toLowerCase().includes(needle)
  ).slice(0, 6).map(r => ({
    id: r.sourceRecordId,
    sub: r.underlying + " · " + (r.finalCustomer || r.book) + " · " + money(r.notionalUsd)
  }));
}

/* ---------- chart layer (shared drawAll for both designs) ---------- */
function makeChartManager() {
  const charts = {};
  return {
    prune() {
      Object.keys(charts).forEach(id => {
        if (!document.getElementById(id)) { try { charts[id].destroy(); } catch (e) {} delete charts[id]; }
      });
    },
    draw(id, opts) {
      const el = document.getElementById(id);
      if (!el) return;
      if (!window.Highcharts) {
        el.innerHTML = "<div style=\"padding:30px;text-align:center;color:#6b7280;font-size:11px\">Chart unavailable — Highcharts CDN not reachable on this machine.</div>";
        return;
      }
      try {
        if (charts[id]) charts[id].destroy();
        charts[id] = Highcharts.chart(id, opts);
      } catch (e) {
        el.innerHTML = "<div style=\"padding:30px;text-align:center;color:#6b7280;font-size:11px\">Chart unavailable</div>";
      }
    }
  };
}
function makeHc(pal) {
  return function hc(type, extra) {
    return Object.assign({
      chart: { type, backgroundColor: "transparent", style: { fontFamily: "Arial,Helvetica,sans-serif" }, height: 225, spacing: [8, 4, 4, 4] },
      title: { text: null }, credits: { enabled: false }, exporting: { enabled: false },
      legend: { itemStyle: { fontSize: "10px" } },
      xAxis: { labels: { style: { fontSize: "10px" } }, lineColor: pal.line, tickColor: pal.line },
      yAxis: { title: { text: null }, labels: { style: { fontSize: "10px" } }, gridLineColor: pal.grid },
      tooltip: { shared: true, valueDecimals: 0 },
      plotOptions: { series: { animation: false, borderRadius: 2 } }
    }, extra || {});
  };
}
function drawStandardCharts(prefix, view, tab, state, cm, hc, opts) {
  const RED = "#db0011", GRAY = "#9ca3af", INK = "#374151", TEAL = "#0f766e";
  const raw = view.rebuild.bucketRows;
  const cats = raw.map(r => bucketShort(r.rowLabel));
  const curYear = String(view.period.year), prvYear = String(view.prvYear);
  cm.prune();
  const mm = alignedMonthlySeries(view.period, view.curRows, view.prvRows, r => r.mssRevenueUsd || 0);
  if (tab === "overview") {
    if (opts && opts.spark) {
      cm.draw(prefix + "spark", hc("areaspline", {
        chart: { type: "areaspline", backgroundColor: "transparent", height: 74, margin: [2, 0, 2, 0], style: { fontFamily: "Arial" } },
        xAxis: { visible: false, categories: mm.cats }, yAxis: { visible: false }, legend: { enabled: false },
        tooltip: { enabled: false },
        plotOptions: { areaspline: { animation: false, fillOpacity: .15, marker: { enabled: false }, lineWidth: 2 } },
        series: [{ name: "Revenue", color: RED, data: mm.cur }]
      }));
    }
    cm.draw(prefix + "ov1", hc("column", { xAxis: { categories: cats }, series: [{ name: curYear, color: RED, data: raw.map(r => Math.round(r.currentRevenueUsd)) }, { name: prvYear, color: GRAY, data: raw.map(r => Math.round(r.priorRevenueUsd)) }] }));
    cm.draw(prefix + "ov2", hc("bar", { xAxis: { categories: cats }, legend: { enabled: false }, series: [{ name: "Headline notional", color: INK, data: raw.map(r => Math.round(r.currentNotionalUsd)) }] }));
    cm.draw(prefix + "ov3", hc("line", { xAxis: { categories: mm.cats }, series: [{ name: curYear, color: RED, data: mm.cur }, { name: prvYear, color: GRAY, dashStyle: "ShortDash", data: mm.prv }] }));
    const cum = a => a.reduce((acc, v) => (acc.push((acc[acc.length - 1] || 0) + v), acc), []);
    cm.draw(prefix + "ov4", hc("area", { xAxis: { categories: mm.cats }, plotOptions: { area: { fillOpacity: .12, animation: false } }, series: [{ name: curYear, color: RED, data: cum(mm.cur) }, { name: prvYear, color: GRAY, data: cum(mm.prv) }] }));
    cm.draw(prefix + "ov5", hc("pie", { plotOptions: { pie: { innerSize: "55%", animation: false, dataLabels: { style: { fontSize: "10px" }, distance: 12 } } }, tooltip: { shared: false }, series: [{ name: "Tickets", data: raw.map((r, i) => ({ name: bucketShort(r.rowLabel), y: r.currentCount, color: [RED, "#a3000d", INK, GRAY, TEAL, "#b45309", "#1d4ed8"][i % 7] })) }] }));
    const books = [...new Set(view.curRows.map(r => r.book))];
    const heat = [];
    books.forEach((b, xi) => raw.forEach((r, yi) => {
      const v = view.curRows.filter(t => t.book === b && t.mainSummaryBucket === r.rowLabel).reduce((a, t) => a + (t.mssRevenueUsd || 0), 0);
      heat.push([xi, yi, Math.round(v)]);
    }));
    cm.draw(prefix + "ov6", hc("heatmap", { xAxis: { categories: books, labels: { style: { fontSize: "9px" } } }, yAxis: { categories: raw.map(r => bucketShort(r.rowLabel)), title: null, labels: { style: { fontSize: "9px" } } }, colorAxis: { min: 0, minColor: "#ffffff", maxColor: RED }, legend: { enabled: false }, tooltip: { shared: false }, series: [{ borderWidth: 1, borderColor: (opts && opts.heatBorder) || "#f1f2f4", data: heat }] }));
    // Revenue bridge (waterfall): prior-period total → per-bucket deltas → current total.
    // Respects the total policy; needs highcharts-more.js for the waterfall series type.
    const bridgeEl = document.getElementById(prefix + "ov7");
    if (bridgeEl) {
      if (window.Highcharts && Highcharts.seriesTypes && Highcharts.seriesTypes.waterfall) {
        const bridgeRows = view.includeFx ? raw : raw.filter(r => r.rowLabel !== "FX");
        const prvTot = bridgeRows.reduce((a, r) => a + (r.priorRevenueUsd || 0), 0);
        cm.draw(prefix + "ov7", hc("waterfall", {
          chart: { type: "waterfall", backgroundColor: "transparent", height: 235, style: { fontFamily: "Arial,Helvetica,sans-serif" }, spacing: [8, 4, 4, 4] },
          xAxis: { type: "category", labels: { style: { fontSize: "9px" } } },
          legend: { enabled: false },
          tooltip: { shared: false, pointFormatter: function () { return "<b>" + fmtM(this.y) + "</b>"; } },
          series: [{
            name: "MSS revenue bridge",
            color: RED, upColor: "#15803d", lineColor: GRAY, borderColor: "#ffffff",
            data: [
              { name: prvYear + (view.includeFx ? "" : " ex FX"), y: Math.round(prvTot), color: GRAY },
              ...bridgeRows.map(r => ({ name: bucketShort(r.rowLabel), y: Math.round((r.currentRevenueUsd || 0) - (r.priorRevenueUsd || 0)) })),
              { name: curYear + (view.includeFx ? "" : " ex FX"), isSum: true, color: INK }

      }

  if (DETAIL_TABS.includes(tab)) {
    const det = buildDetailModel(view, tab);
    const tr = det._rows;
    const dm = alignedMonthlySeries(view.period, tr, [], r => r.mssRevenueUsd || 0);
    if (tab === "structured-fi") {
      const g = groupSumFacts(tr, r => bucketShort(r.assetClass) + "·" + String(r.book || "").replace("HBAP-", "").replace("HBEU-", "EU-"), view.fx);

      const g = groupSumFacts(tr, r => r.underlying, view.fx);
      cm.draw(prefix + "det1", hc("bar", { xAxis: { categories: g.map(v => v.key), labels: { style: { fontSize: "9px" } } }, legend: { enabled: false }, series: [{ name: "Revenue", color: RED, data: g.map(v => Math.round(v.revenue)) }] }));

/* ---------- settings + workbook persistence (localStorage) ---------- */
function persistSettings() {
  try {
    localStorage.setItem(STORAGE_KEY + ".settings", JSON.stringify({
      period: state.period, mode: state.mode, fxMode: state.fxMode, fxManual: state.fxManual,
      includeFx: state.includeFx, tab: state.tab,
      fAsset: state.fAsset, fBook: state.fBook, fTrader: state.fTrader, fAction: state.fAction
    }));
  } catch (e) { /* storage unavailable (private mode etc.) — non-fatal */ }
}
function loadPersistedSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY + ".settings") || "null");
    if (s && typeof s === "object") Object.assign(state, s);
  } catch (e) {}
}
const MAX_STORED_WORKBOOK_BYTES = 3.5 * 1024 * 1024; // stay under the ~5MB localStorage cap
function storeWorkbookBytes(buffer, name) {
  try {
    if (buffer.byteLength > MAX_STORED_WORKBOOK_BYTES) return false;
    const bytes = new Uint8Array(buffer);
    let bin = "";
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    localStorage.setItem(STORAGE_KEY + ".workbook", JSON.stringify({ name, b64: btoa(bin) }));
    return true;
  } catch (e) { return false; }
}
function hasStoredWorkbook() {
  try { return localStorage.getItem(STORAGE_KEY + ".workbook") != null; } catch (e) { return false; }
}
function clearStoredWorkbook() {
  try { localStorage.removeItem(STORAGE_KEY + ".workbook"); } catch (e) {}
}
function loadStoredWorkbook() {
  try {
    const rec = JSON.parse(localStorage.getItem(STORAGE_KEY + ".workbook") || "null");
    if (!rec || !rec.b64) return null;
    const bin = atob(rec.b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return { name: rec.name, buffer: bytes.buffer };
  } catch (e) { return null; }
}

/* ---------- linkable view state (URL hash) ---------- */
function updateHash() {
  const p = new URLSearchParams();
  p.set("tab", state.tab);
  if (state.period) p.set("p", state.period);
  p.set("m", state.mode);
  p.set("fx", state.fxMode);
  if (state.fxMode === "manual") p.set("fxv", String(state.fxManual));
  p.set("pol", state.includeFx ? "incl" : "ex");
  if (state.fAsset !== "All") p.set("fa", state.fAsset);
  if (state.fBook !== "All") p.set("fb", state.fBook);
  if (state.fTrader !== "All") p.set("ft", state.fTrader);
  if (state.fAction !== "All") p.set("fc", state.fAction);
  if (state.uniFilter) p.set("q", state.uniFilter);
  const h = "#" + p.toString();
  if (location.hash !== h) {
    try { history.replaceState(null, "", h); } catch (e) { location.hash = h; }
  }
}
function applyHashState() {
  if (!location.hash || location.hash.length < 2) return false;
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.get("tab")) state.tab = p.get("tab");
  if (p.get("p")) state.period = p.get("p");
  if (p.get("m")) state.mode = p.get("m");
  if (p.get("fx")) state.fxMode = p.get("fx");
  if (p.get("fxv")) state.fxManual = p.get("fxv");
  if (p.get("pol")) state.includeFx = p.get("pol") !== "ex";
  state.fAsset = p.get("fa") || state.fAsset;
  state.fBook = p.get("fb") || state.fBook;
  state.fTrader = p.get("ft") || state.fTrader;
  state.fAction = p.get("fc") || state.fAction;
  if (p.get("q") != null) state.uniFilter = p.get("q");
  return true;
}
function copyViewLink(btn) {
  updateHash();
  const url = location.href;
  const done = () => {
    if (!btn) return;
    const t = btn.textContent;
    btn.textContent = "Copied ✓";
    setTimeout(() => { btn.textContent = t; }, 1200);
  };
  const manual = () => window.prompt("Copy this view link:", url);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(done, manual);
  } else manual();
}

/* ---------- ⌘K / Ctrl-K command palette ---------- */
const paletteState = { open: false, query: "", index: 0, items: [] };
function paletteItemsFor(query) {
  const q = (query || "").trim().toLowerCase();
  const view = computeBlotterView(state);
  const items = [];
  NAVDEF.forEach(([key, label]) => items.push({ kind: "Go to", label, run: () => { state.tab = key; } }));
  (view ? view.ds.periods : []).forEach(p => items.push({ kind: "Period", label: p.label, run: () => { state.period = p.key; } }));
  [["headline", "Mode: Headline (curated)"], ["raw", "Mode: Raw Rebuild"], ["variance", "Mode: Variance (raw − headline)"]]
    .forEach(([m, label]) => items.push({ kind: "Mode", label, run: () => { state.mode = m; } }));
  items.push({ kind: "Action", label: state.includeFx ? "Total policy: switch to ex FX" : "Total policy: switch to incl FX", run: () => { state.includeFx = !state.includeFx; } });
  items.push({ kind: "Action", label: "Reset filters", run: () => { state.fAsset = "All"; state.fBook = "All"; state.fTrader = "All"; state.fAction = "All"; } });
  items.push({ kind: "Action", label: "Export main summary CSV", run: () => { const v = computeBlotterView(state); if (v) exportMainSummaryCsv({ mode: state.mode, variance: v.variance, summary: v.summary }); } });
  items.push({ kind: "Action", label: "Print summary", run: () => window.print() });
  if (view) {
    distinctFacts(view.ds.factRows, "book").forEach(b => items.push({ kind: "Filter book", label: b, run: () => { state.fBook = b; } }));
    if (q.length >= 2) {
      view.curRows
        .filter(r => (r.sourceRecordId + " " + r.underlying + " " + r.finalCustomer + " " + r.book).toLowerCase().includes(q))
        .slice(0, 8)
        .forEach(r => items.push({
          kind: "Trade",
          label: `${r.sourceRecordId} · ${r.underlying} · ${money(r.notionalUsd)}`,
          alwaysMatch: true,
          run: () => { state.tab = "unified"; state.uniFilter = r.sourceRecordId; }
        }));
    }
  }
  const filtered = q ? items.filter(it => it.alwaysMatch || (it.kind + " " + it.label).toLowerCase().includes(q)) : items;
  return filtered.slice(0, 14);
}
function renderPaletteList() {
  const list = document.getElementById("palList");
  if (!list) return;
  paletteState.items = paletteItemsFor(paletteState.query);
  if (paletteState.index >= paletteState.items.length) paletteState.index = Math.max(0, paletteState.items.length - 1);
  list.innerHTML = paletteState.items.length ? paletteState.items.map((it, i) => `
    <div data-act="palItem" data-arg="${i}" style="padding:8px 12px;display:flex;gap:10px;align-items:center;cursor:pointer;border-radius:6px;background:${i === paletteState.index ? "#fff1f2" : "transparent"}">
      <span style="font-size:9.5px;font-weight:700;color:#db0011;text-transform:uppercase;letter-spacing:.05em;flex:0 0 84px">${escapeHtml(it.kind)}</span>
      <span style="font-size:12.5px;font-weight:600;color:#16181d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(it.label)}</span>
    </div>`).join("") : `<div style="padding:18px;text-align:center;color:#9ca3af;font-size:12px">No matches.</div>`;
}
function openPalette() {
  paletteState.open = true;
  paletteState.query = "";
  paletteState.index = 0;
  const el = document.getElementById("cmdPalette");
  if (!el) return;
  el.style.display = "block";
  el.innerHTML = `
    <div data-act="palClose" style="position:absolute;inset:0;background:rgba(15,17,21,.45)"></div>
    <div style="position:relative;max-width:560px;margin:12vh auto 0;background:#fff;border-radius:10px;box-shadow:0 24px 64px rgba(0,0,0,.35);overflow:hidden">
      <input id="palInput" data-inp="palQuery" type="text" placeholder="Jump to tab, trade, book… or run an action" autocomplete="off"
        style="width:100%;box-sizing:border-box;font:inherit;font-size:13.5px;padding:13px 16px;border:none;border-bottom:1px solid #e5e7eb;outline:none" />
      <div id="palList" style="max-height:46vh;overflow-y:auto;padding:6px"></div>
      <div style="padding:7px 14px;border-top:1px solid #f1f2f4;font-size:10px;color:#9ca3af">↑↓ navigate · Enter select · Esc close</div>
    </div>`;
  renderPaletteList();
  const inp = document.getElementById("palInput");
  if (inp) inp.focus();
}
function closePalette() {
  paletteState.open = false;
  const el = document.getElementById("cmdPalette");
  if (el) { el.style.display = "none"; el.innerHTML = ""; }
}
function runPaletteItem(i) {
  const it = paletteState.items[i];
  if (!it) return;
  closePalette();
  it.run();
  renderApp();
}
function bindPaletteKeys() {
  document.addEventListener("keydown", e => {
    if ((e.metaKey || e.ctrlKey) && String(e.key).toLowerCase() === "k") {
      e.preventDefault();
      if (paletteState.open) closePalette(); else openPalette();
      return;
    }
    if (!paletteState.open) return;
    if (e.key === "Escape") { e.preventDefault(); closePalette(); }
    else if (e.key === "ArrowDown") { e.preventDefault(); paletteState.index = Math.min(paletteState.index + 1, Math.max(0, paletteState.items.length - 1)); renderPaletteList(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); paletteState.index = Math.max(paletteState.index - 1, 0); renderPaletteList(); }
    else if (e.key === "Enter") { e.preventDefault(); runPaletteItem(paletteState.index); }
  });
}

}
function renderContent(view) {
  const root = qs("content");
  if (!view) {
    root.innerHTML = `<div style="color:#6b7280;padding:24px;text-align:center;border:1px dashed #cbd5e1;border-radius:10px;background:#fff">No dataset loaded. Upload a workbook from the masthead.</div>`;
    return;
  }
  let body = "";
  if (state.tab === "overview") body = overviewHtml(view);
  else if (DETAIL_TABS.includes(state.tab)) body = detailHtml(view);
  else if (state.tab === "reconciliation") body = reconHtml(view);
  else if (state.tab === "unified") body = unifiedHtml(view);
  else if (state.tab === "input") body = inputHtml(view);
  else if (state.tab === "qa") body = qaHtml(view);
  else body = infoHtml();
  root.innerHTML = filterBarHtml(view) + body;
}

/* ---------- render + charts ---------- */
let rafId = null;
function renderApp() {
  const view = computeBlotterView(state);
  renderPills(view);
  renderHero(view);
  renderToolbar(view);
  renderTabs();
  renderSearchResults();
  renderContent(view);
  persistSettings();
  updateHash();
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(() => {
    if (view) drawStandardCharts(CHART_PREFIX, view, state.tab, state, cm, hc, { spark: true, heatBorder: "#f4f2ef" });
    const marker = qs("ready-marker");
    if (marker) marker.dataset.status = "ready";
  });
}
function updateUnifiedRegion() {
  const view = computeBlotterView(state);
  if (!view) return;
  const uni = buildUnifiedModel(view, state.uniFilter);
  const body = qs("uniBody"), count = qs("uniCount");
  if (body) body.innerHTML = gridRowsHtml(uni.grid, uni.rows, TPAL);
  if (count) count.textContent = uni.count;
  updateHash();
}

/* ---------- events ---------- */
async function handleUpload(file) {
  if (!file) return;
  try {
    const buffer = await file.arrayBuffer();
    const ds = parseWorkbookBuffer(buffer, file.name);
    if (!storeWorkbookBytes(buffer, file.name)) console.warn("Workbook too large to persist locally; it will not survive a reload.");
    state.dataset = ds;
    state.period = ds.periods[0]?.key || null;
    state.inputSheet = ds.sheetNames[0] || null;
    state.expanded = {}; state.expandedBooks = {};
    state.fAsset = "All"; state.fBook = "All"; state.fTrader = "All"; state.fAction = "All";
    state.uniFilter = ""; state.search = "";
    state.loadError = "";
    if (ds.workbookHeadlines?.trsFxOverride && state.fxMode === "manual") {
      state.fxManual = ds.workbookHeadlines.trsFxOverride.toFixed(4);
    }
  } catch (e) {
    state.loadError = "Workbook parse failed: " + (e?.message || "unknown error");
  }
  renderApp();
}
async function refreshFx() {
  state.fxLiveState = "pending";
  renderPills(computeBlotterView(state));
  const res = await fetchLiveUsdHkd();
  state.liveFx = res.value;
  state.fxLiveState = res.live ? "live" : "fallback";
  renderApp();
}
function bindEvents() {
  document.body.addEventListener("click", e => {
    const el = e.target.closest("[data-act]");
    if (!el) return;
    const act = el.dataset.act, arg = el.dataset.arg;
    if (act === "tab") { state.tab = arg; renderApp(); }
    else if (act === "bucket") { state.expanded[arg] = !state.expanded[arg]; renderApp(); }
    else if (act === "book") { state.expandedBooks[arg] = !state.expandedBooks[arg]; renderApp(); }
    else if (act === "trade" || act === "sres") { state.tab = "unified"; state.uniFilter = arg; state.search = ""; const s = qs("bSearch"); if (s) s.value = ""; renderApp(); }
    else if (act === "export") { const view = computeBlotterView(state); if (view) exportMainSummaryCsv({ mode: state.mode, variance: view.variance, summary: view.summary }); }
    else if (act === "print") window.print();
    else if (act === "upload") qs("fileInput").click();
    else if (act === "sheet") { state.inputSheet = arg; renderApp(); }
    else if (act === "fxrefresh") refreshFx();
    else if (act === "resetFilters") { state.fAsset = "All"; state.fBook = "All"; state.fTrader = "All"; state.fAction = "All"; renderApp(); }
    else if (act === "copyLink") copyViewLink(el);
    else if (act === "clearStored") { clearStoredWorkbook(); state.dataset = buildSampleDataset(); state.period = state.dataset.periods[0].key; state.inputSheet = state.dataset.sheetNames[0]; state.loadError = ""; renderApp(); }
    else if (act === "palItem") runPaletteItem(Number(arg));
    else if (act === "palClose") closePalette();
  });
  document.body.addEventListener("change", e => {
    const el = e.target.closest("[data-chg]");
    if (!el) return;
    const k = el.dataset.chg;
    if (k === "file") { handleUpload(el.files && el.files[0]); el.value = ""; return; }
    if (k === "includeFx") state.includeFx = el.value === "true";
    else state[k] = el.value;
    renderApp();
  });
  document.body.addEventListener("input", e => {
    const el = e.target.closest("[data-inp]");
    if (!el) return;
    if (el.dataset.inp === "search") { state.search = el.value; renderSearchResults(); }
    if (el.dataset.inp === "uniFilter") { state.uniFilter = el.value; updateUnifiedRegion(); }
    if (el.dataset.inp === "palQuery") { paletteState.query = el.value; paletteState.index = 0; renderPaletteList(); }
  });
}

/* ---------- init ---------- */
function init() {
  state.dataset = buildSampleDataset();
  state.period = state.dataset.periods[0].key;
  state.inputSheet = state.dataset.sheetNames[0];
  loadPersistedSettings();
  const stored = loadStoredWorkbook();
  if (stored) {
    try {
      state.dataset = parseWorkbookBuffer(stored.buffer, stored.name);
      state.inputSheet = state.dataset.sheetNames[0];
    } catch (e) {
      state.loadError = "Stored workbook could not be re-parsed: " + (e?.message || "unknown error") + ". Showing sample data.";
    }
  }
  if (!state.dataset.periods.some(p => p.key === state.period)) state.period = state.dataset.periods[0].key;
  applyHashState();
  bindEvents();
  bindPaletteKeys();
  window.addEventListener("hashchange", () => { applyHashState(); renderApp(); });
  renderApp();
  refreshFx(); // enterprise USDHKD feed; falls back to 7.8430 when unreachable
  const poll = setInterval(() => {
    if (window.Highcharts) { clearInterval(poll); renderApp(); }
  }, 200);
  setTimeout(() => clearInterval(poll), 15000);
}
init();

</script>
